name: flutter_gym_scheduler
description: "Gym Scheduler App - Flutter with SQLite, Firebase, and Stripe Integration"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  http: ^1.1.0
  dio: ^5.4.0
  
  # Local Database - SQLite
  sqflite: ^2.3.0
  path: ^1.8.3
  
  # State Management
  provider: ^6.1.0
  
  # UI Components
  cupertino_icons: ^1.0.2
  flutter_staggered_grid_view: ^0.7.0
  shimmer: ^3.0.0
  
  # Payment Integration - Stripe
  flutter_stripe: ^9.4.0
  
  # Date & Time
  intl: ^0.19.0
  
  # Image Handling
  image_picker: ^1.0.8
  
  # Secure Storage
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.2.3
  
  # Connectivity
  connectivity_plus: ^5.0.0

  # External URL launcher
  url_launcher: ^6.3.0
  # QR code generator for showing payment QR (not used — removed)
  
  # Utils
  uuid: ^4.0.0
  logger: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
